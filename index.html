<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Form Generator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f4f4; }

        /* Landing Page Styles */
        #landing-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .btn-xl {
            padding: 20px 40px;
            font-size: 24px;
            margin: 20px;
            border-radius: 10px;
            min-width: 300px;
        }

        /* Form Styles */
        .same { font-size: 20px !important; }
        .size { font-size: 16px; }

        .main {
            width: 8.27in;
            min-height: 11.69in;
            background: white;
            /* Added Padding for Print Safety */
            padding: 40px 30px;
            margin-bottom: 30px;
        }

        input {
            font-size: 20px;
            font-weight: bold;
            width: 200px;
            background: transparent;
        }
        /* Inputs inside grid */
        .data input { width: 100%; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>

<body>

    <section id="landing-page">
        <h1 class="mb-5 font-weight-bold">Select Form Type</h1>
        <div>
            <button class="btn btn-primary btn-xl shadow" onclick="loadForm('hdfc')">
                📄 Customer Form<br><small style="font-size: 14px;">(Mother Name, Income, Height/Weight)</small>
            </button>
            <button class="btn btn-success btn-xl shadow" onclick="loadForm('agency')">
                💼 Agency Form<br><small style="font-size: 14px;">(Bank Details, Roll No, Board)</small>
            </button>
        </div>
    </section>

    <section id="form-page" class="w-full container-fluid justify-content-center align-items-center hidden">
        <div class="d-flex justify-content-center my-3">
            <button class="btn btn-secondary mr-2" onclick="goBack()">⬅ Back to Selection</button>
        </div>

        <div class="main shadow mx-auto">

            <div class="title mb-4 h2 text-center" id="formTitle">HDFC LIFE</div>

            <div class="user d-flex justify-content-between my-4 w-100 px-1">
                <div class="name">
                    <h5 class="same font-weight-bolder">Ramesh Khan</h5>
                    <h5 class="same font-weight-bolder">Branch Head Bilara</h5>
                    <h5 class="same font-weight-bolder">8058846346</h5>
                </div>

                <div class="fc">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="same mb-0 px-3" id="label1">Champion Name</h5>
                        <input type="text" id="inputName" class="border-dark border-left-0 border-top-0 border-right-0 p-0 mx-3">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="same mb-0 px-3" id="label2">Champion Code</h5>
                        <input type="text" id="inputCode" class="border-dark border-left-0 border-top-0 border-right-0 p-0 mx-3">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="same mb-0 px-3" id="label3">Mobile No.</h5>
                        <input type="text" class="border-dark border-left-0 border-top-0 border-right-0 p-0 mx-3">
                    </div>
                    <div class="text-right mt-3">
                        <button class="btn btn-dark btn-sm" id="snapBtn" onclick="takeSnap()">📸 Take Snap</button>
                    </div>
                </div>
            </div>

            <div class="data w-100 d-flex flex-column" id="dataPlace"></div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
    <script>
        // --- DATA CONFIGURATION ---

        // LIST 1: Customer Form
        const dataHDFC = [
            "Pan card number", "Aadhar card no.", "Address proof", "One photo",
            "Name", "Mother name", "Mobile no.", "Email id", "Education qualification",
            "Marital status", "Occupation", "Company name/file name", "Designation",
            "Annual income", "Birthplace", "Height", "Weight", "Covid certified",
            "Nominee name", "Nominee relation", "Nominee date of birth",
            "Existing insurance details"
        ];

        // LIST 2: Agency Form
        const dataAgency = [
            "Pan card number", "Aadhar card no.", "Address proof", "One photo",
            "Name", "Mobile No.", "Email id", "Education qualification",
            "Roll No.", "Board Name", "Year of passing",
            "Bank Account number", "Bank Name", "IFSC Code",
            "Marital status", "Nominee", "Nominee date of birth",
            "Existing insurance details"
        ];

        // --- ELEMENTS ---
        const landingPage = document.getElementById("landing-page");
        const formPage = document.getElementById("form-page");
        const dataPlace = document.getElementById("dataPlace");
        const formTitle = document.getElementById("formTitle");
        const label1 = document.getElementById("label1");
        const label2 = document.getElementById("label2");
        const inputName = document.getElementById("inputName");
        const inputCode = document.getElementById("inputCode");

        // --- FUNCTIONS ---

        function loadForm(type) {
            landingPage.classList.add("hidden");
            formPage.classList.remove("hidden");
            formPage.classList.add("d-flex");
            dataPlace.innerHTML = "";

            let currentData = [];

            if (type === 'hdfc') {
                formTitle.innerText = "HDFC LIFE";
                label1.innerText = "Champion Name";
                label2.innerText = "Champion Code";
                currentData = dataHDFC;
            } else {
                formTitle.innerText = "HDFC Life Agency for details";
                label1.innerText = "Leader Name";
                label2.innerText = "Emp Code";
                currentData = dataAgency;
            }

            // Generate Rows
            currentData.forEach((dataItem) => {
                const row = document.createElement("div");
                row.classList.add("row", "border", "d-flex", "justify-content-center", "align-items-center", "w-100", "ml-0", "mr-0");

                row.innerHTML = `
                    <h5 class="col-4 border-dark border-right size py-1 mb-0">${dataItem}</h5>
                    <input class="col-8 border-0 pl-2">`;
                dataPlace.appendChild(row);
            });
        }

        function goBack() {
            formPage.classList.add("hidden");
            formPage.classList.remove("d-flex");
            landingPage.classList.remove("hidden");
            // Clear inputs when going back
            inputName.value = "";
            inputCode.value = "";
        }

        const takeSnap = () => {
            const btn = document.querySelector("#snapBtn");
            const backBtn = document.querySelector(".btn-secondary");

            // 1. Generate Custom Filename
            let nameVal = inputName.value.trim();
            let codeVal = inputCode.value.trim();

            // Agar khali ho toh default naam dedo, nahi toh combine karo
            let fileName = "form-snapshot.png";
            if(nameVal && codeVal) {
                fileName = `${nameVal}_${codeVal}.png`;
            } else if (nameVal) {
                fileName = `${nameVal}.png`;
            }

            // 2. Prepare UI for Snapshot
            btn.classList.add("hidden");
            backBtn.classList.add("hidden");

            const inputs = document.querySelectorAll(".fc input");
            inputs.forEach(i => i.classList.add("border-0"));

            const formContainer = document.querySelector(".main");

            // 3. Capture & Download
            html2canvas(formContainer, { scale: 2 }).then(canvas => {
                btn.classList.remove("hidden");
                backBtn.classList.remove("hidden");
                inputs.forEach(i => i.classList.remove("border-0"));

                const link = document.createElement("a");
                link.href = canvas.toDataURL();
                link.download = fileName; // Use dynamic filename here
                link.click();
            });
        }
    </script>
</body>
</html>
